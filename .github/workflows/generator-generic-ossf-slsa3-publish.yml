<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>SoundVisionoff</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #0f0f0f, #1a1a2e);
      color: white;
    }

    header {
      padding: 40px;
      text-align: center;
    }

    header h1 {
      font-size: 3em;
      background: linear-gradient(90deg, #00f2ff, #8a2be2);
      -webkit-background-clip: text;
      color: transparent;
    }

    .container {
      padding: 20px;
      max-width: 900px;
      margin: auto;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border-radius: 20px;
      padding: 20px;
      margin: 20px 0;
      backdrop-filter: blur(10px);
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.03);
    }

    button {
      background: #8a2be2;
      border: none;
      padding: 10px 20px;
      border-radius: 10px;
      color: white;
      cursor: pointer;
    }

  </style>
</head>
<body>

<header>
  <h1>SoundVisionoff</h1>
  <p>Paroles & univers musical</p>
</header>

<div class="container">
  <div class="card">
    <h2>Encore</h2>
    <p>Minuit passé, j’fixe le plafond...</p>
    <button>Voir plus</button>
  </div>
</div>

</body>
